# # # Configuration for dataloader preparation
batch_size: 16
num_workers: 2
start_date: null
end_date: null
#start_date: "2022-12-06"
#end_date: "2023-03-02"
#start_date: "2022-12-15"
#end_date: "2023-01-01"
dataset_tag: "vb07"
csv_path_data: "complete_triples_vb07_full_sorted_remote.csv"
csv_overview_data: "overview_data_vb07.csv"
csv_path_data_filtered: "complete_triples_vb07_filtered_remote.csv"
csv_overview_data_filtered: "overview_data_vb07_filtered.csv"
partition_ratios: [0.7, 0.2]  # You only need train and val ratio. Test ratio is computed from subtraction.
numpy_random_seed: 42  # Shuffle the indices of the DataFrame before partitioning
torch_seed: 42  # Set seed locally for deterministic DataLoader shuffle

# NOTE: Provide non-empty filter conditions (value_*, interval_*, diff_*) if metadata_statistics = True
# because start_date & end_date is narrowing down the data after the metadata statistics are computed!
metadata_statistics: "True"
hist_metadata_artifacts: "True"
hist_bins: [50, 50, 50, 50, 50, 50, 30, 300]
parameter_dir_names: ["outside_temperature", "nacelle_orientation", "pitch_angle",
                      "rotation_speed", "wind_speed", "wind_direction"]
parameter_csv_keys: ["outside_temperature", "nacelle_orientation", "pitch_angle",
                     "rotation_speed", "wind_speed", "wind_direction",
                     "label", "label_quality", "metadata_version"]

value_conditions:
  null
#  label: "ROT2"

interval_conditions:
#  null
#  wind_speed: [720, 1450]
#  pitch_angle: [-0.5, 10.5]
#  rotation_speed: [5, 15]
#  outside_temperature: [0, 30]
#  timestamp: ["2022-11-02_07_59_14_015_+0100", "2023-01-06_09_58_30_999_+0100"]
  timestamp: ["2022-12-15_07_33_18_185_+0100", "2023-02-25_12_33_19_193_+0100"]

diff_conditions:
  null
#  [["nacelle_orientation", "wind_direction", 50]]

data_augmentation: null
